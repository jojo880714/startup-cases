<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創業案例資料庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 30px 0;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Filter Section */
        .filter-section {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Button */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
        }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .results-count {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .case-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .case-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .case-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .case-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .case-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .case-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-difficulty {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
        }

        .tag-tech {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            font-family: 'JetBrains Mono', monospace;
        }

        .case-meta {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-label {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .meta-value {
            font-weight: 600;
            color: var(--text);
        }

        /* Form Section */
        .form-section {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chart-section {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .chart-section h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--text);
        }

        .chart-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .chart-label {
            min-width: 80px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chart-bar-bg {
            flex: 1;
            height: 32px;
            background: var(--bg);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .chart-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 6px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        /* Loading & Messages */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 創業案例資料庫</h1>
            <p>AI 設計部門 - 專案報價與可行性評估系統</p>
        </div>
    </header>

    <main class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 查詢案例</button>
            <button class="tab" onclick="switchTab('add')">➕ 新增案例</button>
            <button class="tab" onclick="switchTab('stats')">📊 統計分析</button>
        </div>

        <!-- 查詢案例 -->
        <div id="search-tab" class="tab-content active">
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="form-group">
                        <label>難度等級</label>
                        <select id="filter-difficulty">
                            <option value="">全部</option>
                            <option value="初級">初級</option>
                            <option value="中級">中級</option>
                            <option value="高級">高級</option>
                            <option value="專家">專家</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>技術關鍵字</label>
                        <input type="text" id="filter-tech" placeholder="例如: Node.js">
                    </div>
                    <div class="form-group">
                        <label>最低價格</label>
                        <input type="number" id="filter-price-min" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>最高價格</label>
                        <input type="number" id="filter-price-max" placeholder="1000000">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="searchCases()">🔍 查詢</button>
                <button class="btn btn-secondary" onclick="resetFilters()">🔄 重置</button>
            </div>

            <div id="search-results">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>載入中...</p>
                </div>
            </div>
        </div>

        <!-- 新增案例 -->
        <div id="add-tab" class="tab-content">
            <div class="form-section">
                <h2>新增創業案例</h2>
                <div id="add-message"></div>
                
                <div class="form-group">
                    <label>案例名稱 *</label>
                    <input type="text" id="add-name" placeholder="例如: AI 聊天機器人客服系統" required>
                </div>

                <div class="form-group">
                    <label>詳細描述 *</label>
                    <textarea id="add-description" placeholder="詳細描述專案內容、功能需求..." required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>技術堆疊 *</label>
                        <input type="text" id="add-techStack" placeholder="例如: Node.js, React, MongoDB" required>
                    </div>
                    <div class="form-group">
                        <label>難度等級 *</label>
                        <select id="add-difficulty" required>
                            <option value="">請選擇</option>
                            <option value="初級">初級</option>
                            <option value="中級">中級</option>
                            <option value="高級">高級</option>
                            <option value="專家">專家</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>預估工時 (小時)</label>
                        <input type="number" id="add-hours" placeholder="40">
                    </div>
                    <div class="form-group">
                        <label>價格範圍</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="number" id="add-price-min" placeholder="最低" style="flex: 1;">
                            <span style="align-self: center;">~</span>
                            <input type="number" id="add-price-max" placeholder="最高" style="flex: 1;">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>可行性評分 (0-100)</label>
                        <input type="number" id="add-feasibility" min="0" max="100" placeholder="85">
                    </div>
                    <div class="form-group">
                        <label>商業價值評分 (0-100)</label>
                        <input type="number" id="add-business" min="0" max="100" placeholder="90">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>來源類型</label>
                        <input type="text" id="add-source-type" placeholder="例如: 客戶詢價">
                    </div>
                    <div class="form-group">
                        <label>來源網址</label>
                        <input type="url" id="add-source-url" placeholder="https://...">
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" onclick="addCase()">✅ 新增案例</button>
                    <button class="btn btn-secondary" onclick="clearForm()">🗑️ 清除表單</button>
                </div>
            </div>
        </div>

        <!-- 統計分析 -->
        <div id="stats-tab" class="tab-content">
            <div id="stats-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>載入統計資料中...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ===== 設定區 =====
        // 👇 請將你的 Web App URL 貼在這裡
        const GAS_WEB_APP_URL = '請替換成你的 Web App URL';
        
        // ===== 全域變數 =====
        let allCases = [];

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            searchCases();
        });

        // ===== Tab 切換 =====
        function switchTab(tabName) {
            // 移除所有 active
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            // 加上新的 active
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');

            // 載入對應資料
            if (tabName === 'search') {
                searchCases();
            } else if (tabName === 'stats') {
                loadStats();
            }
        }

        // ===== 查詢案例 =====
        async function searchCases() {
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>查詢中...</p></div>';

            try {
                const difficulty = document.getElementById('filter-difficulty')?.value || '';
                const tech = document.getElementById('filter-tech')?.value || '';
                const priceMin = document.getElementById('filter-price-min')?.value || '';
                const priceMax = document.getElementById('filter-price-max')?.value || '';

                let url = `${GAS_WEB_APP_URL}?action=getCases`;
                if (difficulty) url += `&difficulty=${encodeURIComponent(difficulty)}`;
                if (tech) url += `&techStack=${encodeURIComponent(tech)}`;
                if (priceMin) url += `&priceMin=${priceMin}`;
                if (priceMax) url += `&priceMax=${priceMax}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    allCases = data.data.cases;
                    displayCases(allCases);
                } else {
                    resultsDiv.innerHTML = `<div class="alert alert-error">❌ ${data.message}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-error">❌ 查詢失敗: ${error.message}</div>`;
            }
        }

        function displayCases(cases) {
            const resultsDiv = document.getElementById('search-results');

            if (cases.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>沒有找到符合條件的案例</p>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="results-header">
                    <div class="results-count">找到 <strong>${cases.length}</strong> 筆案例</div>
                </div>
                <div class="cases-grid">
                    ${cases.map(c => `
                        <div class="case-card">
                            <div class="case-header">
                                <span class="case-id">${c.id}</span>
                            </div>
                            <h3 class="case-title">${c.name}</h3>
                            <p class="case-description">${c.description}</p>
                            <div class="case-tags">
                                <span class="tag tag-difficulty">${c.difficulty}</span>
                                ${c.techStack.split(',').slice(0, 3).map(tech => 
                                    `<span class="tag tag-tech">${tech.trim()}</span>`
                                ).join('')}
                            </div>
                            <div class="case-meta">
                                <div class="meta-item">
                                    <span class="meta-label">預估工時</span>
                                    <span class="meta-value">${c.estimatedHours} 小時</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">價格範圍</span>
                                    <span class="meta-value">${formatPrice(c.priceMin)} ~ ${formatPrice(c.priceMax)}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">可行性</span>
                                    <span class="meta-value">${c.feasibilityScore}分</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            resultsDiv.innerHTML = html;
        }

        function resetFilters() {
            document.getElementById('filter-difficulty').value = '';
            document.getElementById('filter-tech').value = '';
            document.getElementById('filter-price-min').value = '';
            document.getElementById('filter-price-max').value = '';
            searchCases();
        }

        // ===== 新增案例 =====
        async function addCase() {
            const messageDiv = document.getElementById('add-message');
            messageDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>新增中...</p></div>';

            try {
                const caseData = {
                    name: document.getElementById('add-name').value,
                    description: document.getElementById('add-description').value,
                    techStack: document.getElementById('add-techStack').value,
                    difficulty: document.getElementById('add-difficulty').value,
                    estimatedHours: parseInt(document.getElementById('add-hours').value) || 0,
                    priceMin: parseInt(document.getElementById('add-price-min').value) || 0,
                    priceMax: parseInt(document.getElementById('add-price-max').value) || 0,
                    feasibilityScore: parseInt(document.getElementById('add-feasibility').value) || 0,
                    businessValue: parseInt(document.getElementById('add-business').value) || 0,
                    sourceType: document.getElementById('add-source-type').value || '',
                    sourceUrl: document.getElementById('add-source-url').value || ''
                };

                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addCase',
                        data: caseData
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = `<div class="alert alert-success">✅ ${data.message} (案例 ID: ${data.data.caseId})</div>`;
                    clearForm();
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                    }, 3000);
                } else {
                    let errorMsg = data.message;
                    if (data.data && data.data.errors) {
                        errorMsg += '<br><br>' + data.data.errors.map(e => '• ' + e).join('<br>');
                    }
                    messageDiv.innerHTML = `<div class="alert alert-error">❌ ${errorMsg}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="alert alert-error">❌ 新增失敗: ${error.message}</div>`;
            }
        }

        function clearForm() {
            document.getElementById('add-name').value = '';
            document.getElementById('add-description').value = '';
            document.getElementById('add-techStack').value = '';
            document.getElementById('add-difficulty').value = '';
            document.getElementById('add-hours').value = '';
            document.getElementById('add-price-min').value = '';
            document.getElementById('add-price-max').value = '';
            document.getElementById('add-feasibility').value = '';
            document.getElementById('add-business').value = '';
            document.getElementById('add-source-type').value = '';
            document.getElementById('add-source-url').value = '';
        }

        // ===== 統計分析 =====
        async function loadStats() {
            const statsDiv = document.getElementById('stats-content');
            statsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>載入統計資料中...</p></div>';

            try {
                const response = await fetch(`${GAS_WEB_APP_URL}?action=getAnalytics`);
                const data = await response.json();

                if (data.success) {
                    displayStats(data.data);
                } else {
                    statsDiv.innerHTML = `<div class="alert alert-error">❌ ${data.message}</div>`;
                }
            } catch (error) {
                statsDiv.innerHTML = `<div class="alert alert-error">❌ 載入失敗: ${error.message}</div>`;
            }
        }

        function displayStats(stats) {
            const statsDiv = document.getElementById('stats-content');

            const difficultyData = stats.difficultyDistribution || {};
            const techData = stats.techStackTop10 || [];

            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalCases}</div>
                        <div class="stat-label">總案例數</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.avgEstimatedHours}</div>
                        <div class="stat-label">平均工時 (小時)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatPrice(stats.avgPriceMin)}</div>
                        <div class="stat-label">平均最低報價</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatPrice(stats.avgPriceMax)}</div>
                        <div class="stat-label">平均最高報價</div>
                    </div>
                </div>

                <div class="chart-section">
                    <h3>📊 難度分布</h3>
                    ${Object.entries(difficultyData).map(([level, count]) => {
                        const percentage = (count / stats.totalCases * 100).toFixed(1);
                        return `
                            <div class="chart-bar">
                                <div class="chart-label">${level}</div>
                                <div class="chart-bar-bg">
                                    <div class="chart-bar-fill" style="width: ${percentage}%">
                                        ${count} (${percentage}%)
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <div class="chart-section">
                    <h3>🔥 熱門技術 Top 10</h3>
                    ${techData.map((item, index) => {
                        const maxCount = techData[0]?.count || 1;
                        const percentage = (item.count / maxCount * 100).toFixed(1);
                        return `
                            <div class="chart-bar">
                                <div class="chart-label">#${index + 1} ${item.tech}</div>
                                <div class="chart-bar-bg">
                                    <div class="chart-bar-fill" style="width: ${percentage}%">
                                        ${item.count} 次
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            statsDiv.innerHTML = html;
        }

        // ===== 工具函式 =====
        function formatPrice(price) {
            return new Intl.NumberFormat('zh-TW', {
                style: 'currency',
                currency: 'TWD',
                minimumFractionDigits: 0
            }).format(price);
        }
    </script>
</body>
</html>
